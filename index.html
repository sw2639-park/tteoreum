<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F6F5F2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1C1B19" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="떠오름" />
  <title>떠오름</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- 인박스 화면 -->
    <section id="inbox-screen" class="screen"></section>

    <!-- 휴지통 화면 -->
    <section id="trash-screen" class="screen"></section>

    <!-- 상세 화면 -->
    <section id="detail-screen" class="screen"></section>

    <!-- 그래프뷰 화면 (항상 다크 고정) -->
    <section id="graph-screen" class="screen graph-screen"></section>
  </div>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
      navigator.serviceWorker.register('/sw.js').then(reg => {
        // 새 배포 감지 시 즉시 업데이트 확인 + 활성화
        reg.update();
        setInterval(() => reg.update(), 60 * 1000);
      }).catch(console.error);
    }
  </script>
</body>
</html>
